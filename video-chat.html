<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>WC_HAMZEH | تماس تصویری</title>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<style>
body {
  background: #000;
  color: white;
  font-family: sans-serif;
  text-align: center;
  direction: rtl;
}

/* پرچم سیاه تکان‌خورنده */
.flag-box {
  width: 220px;
  height: 130px;
  margin: 25px auto;
  position: relative;
}

.flag {
  width: 220px;
  height: 130px;
  background: black;
  animation: wave 2s infinite ease-in-out;
  border: 3px solid #8b0000;
  border-radius: 5px;
  position: relative;
}

.flag-text {
  position: absolute;
  bottom: 12px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 22px;
  font-weight: bold;
  text-shadow: 0 0 8px #8b0000;
}

@keyframes wave {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}

/* تم عذا */
.header {
  background: linear-gradient(90deg, #8b0000, #000);
  padding: 25px;
  font-size: 32px;
  font-weight: bold;
  box-shadow: 0 0 30px #8b0000;
  border-bottom: 3px solid #8b0000;
}

.box {
  background: #111;
  padding: 25px;
  margin: 20px auto;
  width: 90%;
  border-radius: 15px;
  box-shadow: 0 0 25px #8b0000;
}

.avatar-preview {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin-top: 10px;
  object-fit: cover;
  box-shadow: 0 0 20px #8b0000;
}

.video-area {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin-top: 20px;
}

.video-card {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 25px #8b0000;
  margin: 10px;
  transition: all 0.4s ease;
}

video {
  width: 380px;
  height: 260px;
  border-radius: 15px;
  background: black;
  transition: all 0.4s ease;
}

.video-big video {
  width: 460px;
  height: 320px;
}

.avatar-small {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 0 15px #8b0000;
}

.controls button {
  background: #8b0000;
  border: none;
  padding: 20px 40px;
  margin: 10px;
  border-radius: 15px;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 0 25px #8b0000;
  transition: 0.3s;
}

.controls button:hover {
  transform: scale(1.1);
}

.contacts-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.contact-item {
  background: #1a1a1a;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  box-shadow: 0 0 20px #8b0000;
  cursor: pointer;
  width: 200px;
  transition: 0.3s;
}

.contact-item:hover {
  transform: scale(1.05);
}

.delete-btn {
  background: #8b0000;
  border: none;
  padding: 8px 15px;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- پرچم سیاه -->
<div class="flag-box">
  <div class="flag"></div>
  <div class="flag-text">رسالات الخامنه‌ای</div>
</div>

<header class="header">
  ساخته شده توسط WC_HAMZEH
</header>

<!-- پروفایل -->
<div class="box">
  <h2>پروفایل شما</h2>
  <p style="font-size:22px; color:#8b0000;">شناسه شما: <span id="myId"></span></p>

  <input type="text" id="username" placeholder="نام شما">
  <br><br>
  <input type="file" id="avatar" accept="image/*">
  <br>
  <img id="avatarPreview" class="avatar-preview" src="">
  <p id="profileError" style="color:red; font-size:18px;"></p>
</div>

<!-- افزودن مخاطب -->
<div class="box">
  <h2>افزودن مخاطب</h2>
  <input type="text" id="contactId" placeholder="ID مخاطب (۵ حرف)">
  <br><br>
  <button onclick="addContact()">ذخیره مخاطب</button>
  <p id="contactError" style="color:red; font-size:18px;"></p>
</div>

<!-- لیست مخاطبین -->
<div class="box">
  <h2>مخاطبین شما</h2>
  <div id="contactsContainer" class="contacts-list"></div>
</div>

<!-- ویدیوها -->
<div class="video-area">
  <div class="video-card" id="myCard">
    <h3 id="myNameTag">شما</h3>
    <img id="myAvatarTag" class="avatar-small">
    <video id="myVideo" autoplay muted></video>
  </div>

  <div class="video-card" id="otherCard">
    <h3 id="otherNameTag">طرف مقابل</h3>
    <img id="otherAvatarTag" class="avatar-small">
    <video id="otherVideo" autoplay></video>
  </div>
</div>

<!-- کنترل‌ها -->
<div class="controls">
  <button onclick="toggleMic()">🎤 صدا</button>
  <button onclick="toggleCam()">📷 تصویر</button>
  <button onclick="switchCamera()">🔄 چرخش دوربین</button>
  <button onclick="endCall()">❌ پایان تماس</button>
</div>

<script>
function makeID() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let id = "";
  for (let i = 0; i < 5; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

/* شناسه ثابت */
let myCustomID = localStorage.getItem("myFixedID");
if (!myCustomID) {
  myCustomID = makeID();
  localStorage.setItem("myFixedID", myCustomID);
}
document.getElementById("myId").innerText = myCustomID;

let peer = new Peer(myCustomID);
let myStream;
let currentCall;
let dataConn;
let currentVideoDevice = null;

let contacts = [];

/* لود اطلاعات ذخیره‌شده */
window.onload = () => {
  let savedName = localStorage.getItem("username");
  let savedAvatar = localStorage.getItem("avatar");
  let savedContacts = localStorage.getItem("contacts");

  if (savedName) {
    document.getElementById("username").value = savedName;
    document.getElementById("myNameTag").innerText = savedName;
  }

  if (savedAvatar) {
    document.getElementById("avatarPreview").src = savedAvatar;
    document.getElementById("myAvatarTag").src = savedAvatar;
  }

  if (savedContacts) {
    contacts = JSON.parse(savedContacts);
    renderContacts();
  }
};

/* گرفتن استریم اولیه */
navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
  myStream = stream;
  document.getElementById("myVideo").srcObject = stream;
});

/* دریافت دیتا (اسم + عکس طرف مقابل) */
peer.on('connection', conn => {
  dataConn = conn;

  conn.on('data', data => {
    document.getElementById("otherNameTag").innerText = data.name;
    document.getElementById("otherAvatarTag").src = data.avatar;
  });
});

/* دریافت تماس */
peer.on('call', call => {
  call.answer(myStream);
  currentCall = call;

  call.on('stream', remoteStream => {
    document.getElementById("otherVideo").srcObject = remoteStream;
    enlargeVideos();
  });
});

/* افزودن مخاطب */
function addContact() {
  let id = document.getElementById("contactId").value.trim();

  if (!id) {
    document.getElementById("contactError").innerText = "آیدی مخاطب را وارد کنید.";
    return;
  }
  if (id.length !== 5) {
    document.getElementById("contactError").innerText = "آیدی باید دقیقاً ۵ کاراکتر باشد.";
    return;
  }
  if (!/^[A-Z0-9]+$/.test(id)) {
    document.getElementById("contactError").innerText = "آیدی فقط باید شامل حروف بزرگ و عدد باشد.";
    return;
  }
  if (contacts.some(c => c.id === id)) {
    document.getElementById("contactError").innerText = "این آیدی قبلاً ذخیره شده است.";
    return;
  }

  contacts.push({ id });
  localStorage.setItem("contacts", JSON.stringify(contacts));
  document.getElementById("contactError").innerText = "";
  document.getElementById("contactId").value = "";
  renderContacts();
}

/* نمایش لیست مخاطبین */
function renderContacts() {
  let container = document.getElementById("contactsContainer");
  container.innerHTML = "";

  if (contacts.length === 0) {
    container.innerHTML = "<p>هنوز مخاطبی اضافه نکرده‌اید.</p>";
    return;
  }

  contacts.forEach((c, index) => {
    let div = document.createElement("div");
    div.className = "contact-item";

    div.onclick = (e) => {
      if (e.target.dataset.action === "delete") return;
      callContact(index);
    };

    let name = document.createElement("p");
    name.innerText = "ID: " + c.id;

    let delBtn = document.createElement("button");
    delBtn.innerText = "حذف";
    delBtn.className = "delete-btn";
    delBtn.dataset.action = "delete";
    delBtn.onclick = () => deleteContact(index);

    div.appendChild(name);
    div.appendChild(delBtn);
    container.appendChild(div);
  });
}

/* حذف مخاطب */
function deleteContact(index) {
  contacts.splice(index, 1);
  localStorage.setItem("contacts", JSON.stringify(contacts));
  renderContacts();
}

/* تماس با مخاطب + تست آیدی واقعی */
function callContact(index) {
  let profileName = document.getElementById("username").value.trim();
  let profileAvatar = document.getElementById("avatarPreview").src;

  if (!profileName || !profileAvatar) {
    document.getElementById("profileError").innerText = "اول نام و عکس پروفایل خودتان را کامل کنید.";
    return;
  }

  localStorage.setItem("username", profileName);
  localStorage.setItem("avatar", profileAvatar);

  let contact = contacts[index];

  let testConn = peer.connect(contact.id);

  testConn.on('error', () => {
    alert("آیدی اشتباه است یا کاربر آنلاین نیست.");
  });

  testConn.on('open', () => {
    testConn.send({ name: profileName, avatar: profileAvatar });

    currentCall = peer.call(contact.id, myStream);

    currentCall.on('stream', remoteStream => {
      document.getElementById("otherVideo").srcObject = remoteStream;
      enlargeVideos();
    });

    updateProfileUI();
  });
}

function enlargeVideos() {
  document.getElementById("myCard").classList.add("video-big");
  document.getElementById("otherCard").classList.add("video-big");
}

function toggleMic() {
  myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled;
}

function toggleCam() {
  myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled;
}

function endCall() {
  if (currentCall) currentCall.close();
}

/* چرخش دوربین سالم */
async function getVideoDevices() {
  let devices = await navigator.mediaDevices.enumerateDevices();
  return devices.filter(d => d.kind === "videoinput");
}

async function switchCamera() {
  let cams = await getVideoDevices();

  if (cams.length < 2) {
    alert("فقط یک دوربین موجود است.");
    return;
  }

  let nextIndex = 0;
  if (currentVideoDevice) {
    let idx = cams.findIndex(c => c.deviceId === currentVideoDevice);
    nextIndex = (idx + 1) % cams.length;
  }

  currentVideoDevice = cams[nextIndex].deviceId;

  let newStream = await navigator.mediaDevices.getUserMedia({
    video: { deviceId: { exact: currentVideoDevice } },
    audio: true
  });

  myStream.getTracks().forEach(t => t.stop());

  myStream = newStream;
  document.getElementById("myVideo").srcObject = newStream;

  if (currentCall) {
    let sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === "video");
    sender.replaceTrack(newStream.getVideoTracks()[0]);
  }
}

/* ذخیره پروفایل هنگام انتخاب عکس */
document.getElementById("avatar").addEventListener("change", function() {
  let file = this.files[0];
  let reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("avatarPreview").src = e.target.result;
    document.getElementById("myAvatarTag").src = e.target.result;
    localStorage.setItem("avatar", e.target.result);
  };
  reader.readAsDataURL(file);
});

function updateProfileUI() {
  let name = document.getElementById("username").value.trim();
  let avatar = document.getElementById("avatarPreview").src;

  document.getElementById("myNameTag").innerText = name;
  document.getElementById("myAvatarTag").src = avatar;
  localStorage.setItem("username", name);
  localStorage.setItem("avatar", avatar);
}
</script>

</body>
</html>
